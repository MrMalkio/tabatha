    - paragraph [ref=e71]: "The companion has almost no UI on purpose. It is a tray icon, one optional 480×640 window, and a great deal of machinery underneath - because the thing it is trying to be is invisible: if you have to interact with it, it has already failed at its job. So most of what follows is not a screen but a subsystem, shown as the surface through which you would ever actually meet it. The stages here render the companion's own tokens (accent #4a9eff, green #10ac84) and its 8/4 radius scale - it is a different app from the extension, and it does not pretend otherwise."
