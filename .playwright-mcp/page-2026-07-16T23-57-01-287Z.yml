      - text: Desktop Companion
      - generic [ref=e24]: Built · v0.2.0
    - paragraph [ref=e25]: The browser can only see the browser. The companion is a small Windows tray app that watches the rest of the desktop and tells the extension what it finds, so a stint spent in Figma, Excel or a call is time your day actually accounts for instead of a five-hour hole labelled "idle". It is a separate product with its own release line, its own palette, and its own database. Every component below is built and running today, and it is now something you can download for Windows.
