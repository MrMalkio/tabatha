        - paragraph [ref=e39]: "The companion watches which application and window is in front, sorts that into categories, keeps it in a local SQLite database, and pushes what it sees to the extension over a loopback WebSocket, so a stint spent in Figma, Excel or a call is time your day accounts for. Windows only, and not by oversight: the window monitor is bound to Win32 and the capture engine draws through GDI, so macOS and Linux are a port, not a build flag."
