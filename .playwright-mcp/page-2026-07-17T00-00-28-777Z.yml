      - heading "The family" [level=2] [ref=f1e53]
      - generic [ref=f1e54]: 3 products · one day, counted once
    - paragraph [ref=f1e55]: "Tabatha is three programs that share one clock. They exist separately because attention does not respect process boundaries but operating systems do: an extension can see your tabs and nothing else, a desktop app can see your windows but not what is inside a tab, and neither is in your pocket at 8am. Splitting them is not an architecture preference, it is the only way to see a whole day. Splitting them is also the hard part - so the rule underneath all three is that one shift exists at a time, wherever you started it, and each program yields to whichever of them can actually see what you are doing right now."
